<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <title>Memory</title>
    <script type="module" src="/src/ts/main.ts"></script>
  </head>
  <body>
    <main class="game-content">
      <header class="game-header">
        <section class="score-board" aria-label="Spielstand">
          <div class="score-board__player score-board__player--blue">
            <span class="score-board__marker"></span>
            <span class="score-board__name">Blue</span>
            <span class="score-board__points" id="blue-score">0</span>
          </div>
          <div class="score-board__player score-board__player--orange">
            <span class="score-board__marker"></span>
            <span class="score-board__name">Orange</span>
            <span class="score-board__points" id="orange-score">0</span>
          </div>
        </section>

        <section class="current-player" aria-label="Aktueller Spieler">
          <span class="current-player__label">Current player:</span>
          <span class="current-player__marker"></span>
        </section>

        <button class="exit-game" type="button" aria-label="Exit game"></button>
      </header>

      <section id="field" aria-label="Memory Karten"></section>
    </main>

    <section class="exit-popup" id="exit-popup" aria-label="Exit game popup" hidden>
      <div class="exit-popup__content" role="dialog" aria-modal="true">
        <h2 class="exit-popup__title">Are you sure you want to quit<br />the game?</h2>
        <div class="exit-popup__actions">
          <button class="exit-popup__button exit-popup__back-button" type="button">Back to game</button>
          <button class="exit-popup__button exit-popup__exit-button" type="button">Exit game</button>
        </div>
      </div>
    </section>
  </body>
</html>
